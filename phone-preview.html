<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SONTEE — Mobile Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c0c0e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      font-family: system-ui, -apple-system, sans-serif;
      /* subtle grid */
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 36px;
    }

    /* ── PHONE BODY ── */
    .phone {
      position: relative;
      width: 432px;
      background: linear-gradient(160deg, #2a2a2e 0%, #1c1c1e 40%, #141416 100%);
      border-radius: 58px;
      padding: 18px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.12),
        0 0 0 2px rgba(0,0,0,0.6),
        0 60px 120px rgba(0,0,0,0.95),
        0 20px 40px rgba(0,0,0,0.7),
        0 0 100px rgba(80,130,220,0.06),
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -1px 0 rgba(0,0,0,0.4);
    }

    /* Physical buttons */
    .btn { position: absolute; border-radius: 3px; }
    .btn-silent   { top:  94px; left: -4px; width: 4px; height: 34px;
                    background: linear-gradient(to right, #1a1a1c, #222226); }
    .btn-vol-up   { top: 142px; left: -4px; width: 4px; height: 54px;
                    background: linear-gradient(to right, #1a1a1c, #222226); }
    .btn-vol-dn   { top: 208px; left: -4px; width: 4px; height: 54px;
                    background: linear-gradient(to right, #1a1a1c, #222226); }
    .btn-power    { top: 172px; right: -4px; width: 4px; height: 82px;
                    background: linear-gradient(to left, #1a1a1c, #222226); }

    /* ── SCREEN ── */
    .screen {
      position: relative;
      width: 396px;
      height: 858px;
      border-radius: 44px;
      overflow: hidden;
      background: #000;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    /* Dynamic Island */
    .island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 128px;
      height: 38px;
      background: #000;
      border-radius: 22px;
      z-index: 200;
      pointer-events: none;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    }

    /* Status bar area above iframe */
    .status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 62px;
      background: rgba(6,13,30,0.96);
      z-index: 100;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      padding: 0 24px 8px;
      justify-content: space-between;
    }

    .status-time {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      letter-spacing: -0.01em;
    }

    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .status-icons svg { color: rgba(255,255,255,0.85); }

    /* iframe — 390px wide triggers all phone media queries */
    iframe {
      position: absolute;
      top: 0; left: 0;
      width: 390px;
      height: 844px;
      border: none;
      /* Center the 390px iframe within the 396px screen */
      left: 3px;
    }

    /* Home bar */
    .home-bar {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 148px;
      height: 5px;
      background: rgba(255,255,255,0.28);
      border-radius: 3px;
      z-index: 200;
      pointer-events: none;
    }

    /* ── CAPTION ── */
    .caption {
      margin-top: 32px;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      text-align: center;
    }

    .caption span {
      display: inline-block;
      margin: 0 6px;
      color: rgba(255,255,255,0.12);
    }

    /* ── INSTRUCTIONS ── */
    .instructions {
      margin-top: 40px;
      max-width: 440px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 20px 24px;
      background: rgba(255,255,255,0.02);
    }

    .instructions p {
      font-size: 12px;
      line-height: 1.7;
      color: rgba(255,255,255,0.35);
    }

    .instructions code {
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      color: rgba(237,228,221,0.7);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
  </style>
</head>
<body>
  <p class="label">SONTEE — Phone Preview</p>

  <div class="phone">
    <!-- Side buttons -->
    <div class="btn btn-silent"></div>
    <div class="btn btn-vol-up"></div>
    <div class="btn btn-vol-dn"></div>
    <div class="btn btn-power"></div>

    <div class="screen">
      <!-- Dynamic Island -->
      <div class="island"></div>

      <!-- Simulated status bar -->
      <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
          <!-- Signal bars -->
          <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor">
            <rect x="0"  y="7"  width="3" height="5" rx="1"/>
            <rect x="4.5" y="5" width="3" height="7" rx="1"/>
            <rect x="9"  y="2"  width="3" height="10" rx="1"/>
            <rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.35"/>
          </svg>
          <!-- WiFi -->
          <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor">
            <path d="M8 9.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3z"/>
            <path d="M3.5 5.8C5 4.3 6.4 3.5 8 3.5s3 .8 4.5 2.3l1.5-1.5C12 2.3 10 1 8 1S4 2.3 2 4.3l1.5 1.5z" opacity="0.7"/>
            <path d="M1 3.3C3 1.3 5.4 0 8 0s5 1.3 7 3.3L13.5 1.8C11.8.7 10 0 8 0S4.2.7 2.5 1.8L1 3.3z" opacity="0.35"/>
          </svg>
          <!-- Battery -->
          <svg width="25" height="12" viewBox="0 0 25 12" fill="currentColor">
            <rect x="0" y="1" width="21" height="10" rx="2.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/>
            <rect x="1.5" y="2.5" width="16" height="7" rx="1.5" opacity="0.9"/>
            <path d="M23 4v4a2 2 0 000-4z" opacity="0.4"/>
          </svg>
        </div>
      </div>

      <!-- Site inside the phone -->
      <iframe src="http://localhost:3000" title="SONTEE Mobile" scrolling="yes"></iframe>

      <!-- Home indicator -->
      <div class="home-bar"></div>
    </div>
  </div>

  <div class="caption">
    iPhone 14 Pro
    <span>·</span>
    390 &times; 844
    <span>·</span>
    Mobile Preview
  </div>

  <div class="instructions">
    <p>
      This preview shows <code>localhost:3000</code> at 390px viewport width,
      triggering all mobile styles. Scroll inside the phone to browse.<br><br>
      The main site is at <code>localhost:3000</code> &nbsp;·&nbsp;
      This preview is at <code>localhost:3001</code>
    </p>
  </div>
</body>
</html>
